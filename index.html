<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joel – AT & Testing Scripts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap');

:root {
  --navy: #0f2744;
  --gold: #c8872a;
  --bg: #f0ede8;
  --panel: #fff;
  --border: #d8d3ca;
  --muted: #7a7570;
  --text: #1c1a18;
  --green: #155c30;
  --green-bg: #e2f0e8;
  --orange-bg: #fef0da;
  --orange-fg: #7a4010;
  --red-bg: #f5e8e8;
  --red-fg: #8b1a1a;
  --blue-bg: #e4eef8;
  --note-pill: #dce8f5;
  --note-pill-fg: #0f2744;
  --email-pill: #dff0e8;
  --email-pill-fg: #155c30;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; background: #ffffff; color: var(--text); font-size: 14px; min-height: 100vh; }

/* ── TOP BAR ── */
header {
  background: linear-gradient(135deg, #1b3f72 0%, #2a5298 100%);
  border-bottom: 3px solid var(--gold);
  padding: 0 20px;
  height: 54px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky; top: 0; z-index: 100;
}
.logo { color: white; font-size: 16px; font-weight: 600; white-space: nowrap; }
.logo span { color: var(--gold); }
.search-wrap { flex: 1; max-width: 380px; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: .45; }
#searchBox {
  width: 100%; padding: 7px 12px 7px 32px;
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px; color: white; font-size: 13px; font-family: inherit;
  outline: none;
}
#searchBox::placeholder { color: rgba(255,255,255,.4); }
#searchBox:focus { background: rgba(255,255,255,.18); border-color: var(--gold); }
#clearBtn {
  background: none; border: none; color: rgba(255,255,255,.55);
  font-size: 12px; cursor: pointer; padding: 4px 8px; white-space: nowrap;
  display: none;
}
#clearBtn:hover { color: white; }
#hitCount { color: rgba(255,255,255,.45); font-size: 12px; white-space: nowrap; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 0;
  background: #1b3f72;
  border-bottom: 1px solid rgba(255,255,255,.12);
  padding: 0 20px;
  overflow-x: auto;
}
.tab-btn {
  padding: 9px 18px;
  background: none; border: none; border-bottom: 3px solid transparent;
  color: rgba(255,255,255,.55); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; white-space: nowrap;
  margin-bottom: -1px;
  transition: color .15s;
}
.tab-btn:hover { color: rgba(255,255,255,.85); }
.tab-btn.active { color: white; border-bottom-color: var(--gold); }
.tab-count {
  display: inline-block; background: rgba(255,255,255,.12);
  border-radius: 10px; padding: 1px 6px; font-size: 10px;
  margin-left: 5px; vertical-align: middle;
}

/* ── CONTENT ── */
.content { padding: 20px; max-width: 900px; }

.tab-page { display: none; }
.tab-page.active { display: block; }

/* search result banner */
.search-banner {
  background: #fffbe6; border: 1px solid #f0d860;
  border-radius: 6px; padding: 8px 14px;
  font-size: 12.5px; margin-bottom: 16px; display: none;
}
.search-banner.on { display: block; }

/* ── SCRIPT CARDS ── */
.cards { display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  cursor: pointer; user-select: none;
  transition: background .1s;
}
.card-head:hover { background: #faf8f5; }
.card.open .card-head { background: #faf8f5; border-bottom: 1px solid var(--border); }

.card-icon { font-size: 18px; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 13.5px; font-weight: 600; color: var(--navy); }
.card-when { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-style: italic; }

.pill {
  font-size: 10px; font-weight: 600;
  padding: 2px 9px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;
}
.pill-note  { background: var(--note-pill);  color: var(--note-pill-fg); }
.pill-email { background: var(--email-pill); color: var(--email-pill-fg); }
.pill-warn  { background: var(--orange-bg);  color: var(--orange-fg); }
.pill-red   { background: var(--red-bg);     color: var(--red-fg); }

.chevron { color: var(--muted); font-size: 10px; flex-shrink: 0; transition: transform .2s; }
.card.open .chevron { transform: rotate(90deg); }

.card-body { display: none; padding: 14px 16px; }
.card.open .card-body { display: block; }

/* date/subject header for case notes */
.note-header {
  background: var(--blue-bg);
  border-radius: 6px;
  padding: 10px 14px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.note-header-row {
  display: flex; align-items: center; gap: 10px;
}
.note-header-row label {
  font-size: 11px; font-weight: 700;
  color: var(--navy); width: 62px; flex-shrink: 0;
  text-transform: uppercase; letter-spacing: .4px;
}
.note-header-row input {
  flex: 1; background: white; border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 9px;
  font-family: inherit; font-size: 13px; color: var(--text);
  outline: none; min-width: 0;
}
.note-header-row input:focus { border-color: var(--navy); }
.note-header-row .subj-text {
  flex: 1; font-size: 13px; color: var(--navy);
  font-weight: 500; min-width: 0;
}

/* subject line for emails */
.subj-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-bg); border-radius: 5px;
  padding: 6px 10px; margin-bottom: 10px;
}
.subj-row label { font-size: 11px; font-weight: 600; color: var(--navy); white-space: nowrap; }
.subj-row input {
  flex: 1; background: none; border: none; outline: none;
  font-family: inherit; font-size: 12.5px; color: var(--text);
}

/* script textarea */
.script-wrap { position: relative; }
textarea.script {
  width: 100%; min-height: 120px;
  padding: 12px 14px; padding-right: 90px;
  background: #fafaf8; border: 1px solid var(--border); border-radius: 6px;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.65;
  color: var(--text); resize: none; outline: none;
}
textarea.script:focus { border-color: var(--navy); background: white; }

.copy-btn {
  position: absolute; top: 8px; right: 8px;
  background: var(--navy); color: white;
  border: none; padding: 5px 13px;
  border-radius: 5px; font-size: 11px; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.copy-btn:hover { background: #1a3a5c; }
.copy-btn.done { background: var(--green); }

/* empty state */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
</style>
</head>
<body>

  <div class="logo">Joel · <span>Assistive Technology & Testing</span></div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="white" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.868-3.833zm-5.242 1.656a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>

// ─────────────────────────────────────────────────────────
// BUILD
// ─────────────────────────────────────────────────────────
let activeTab = 'case-notes';

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard(s) {
  const isEmail = s.type === 'email';

  // ── Case note header: editable Date + static Subject ──
  let headerHtml = '';
  if (!isEmail && s.meta) {
    const subj = s.meta.Subject || '';
    const dur  = s.meta.Duration || '';
    headerHtml = `
    <div class="note-header">
      <div class="note-header-row">
        <label>Date:</label>
        <input type="text" id="date-${s.id}" placeholder="e.g. July 7, 2025">
      </div>
      <div class="note-header-row">
        <label>Subject:</label>
        <span class="subj-text">${esc(subj)}</span>
      </div>
      ${dur ? `<div class="note-header-row"><label>Duration:</label><span class="subj-text">${esc(dur)}</span></div>` : ''}
    </div>`;
  }

  // ── Email header: editable Subject ──
  const subjHtml = isEmail ? `
    <div class="subj-row">
      <label>Subject:</label>
      <input type="text" id="subj-${s.id}" value="${esc(s.subject||'')}">
    </div>` : '';

  const rows = Math.max(6, (s.script.match(/\n/g)||[]).length + 3);

  return `
  <div class="card" id="card-${s.id}">
    <div class="card-head" onclick="toggleCard('${s.id}')">
      <span class="card-icon">${s.icon}</span>
      <div class="card-info">
        <div class="card-title">${esc(s.title)}</div>
        <div class="card-when">Use when: ${esc(s.when)}</div>
      </div>
      <span class="pill ${s.pillType}">${s.pill}</span>
      <span class="chevron">▶</span>
    </div>
    <div class="card-body">
      ${headerHtml}
      ${subjHtml}
      <div class="script-wrap">
        <textarea class="script" id="txt-${s.id}" rows="${rows}">${esc(s.script)}</textarea>
        <button class="copy-btn" id="cbtn-${s.id}" onclick="copyIt('${s.id}')">Copy</button>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  document.getElementById(`card-${id}`).classList.toggle('open');
}

function copyIt(id) {
  const s = SCRIPTS.find(x => x.id === id);
  const body = document.getElementById(`txt-${id}`).value;

  let text = '';

  if (s.type === 'email') {
    // email: Subject line + blank line + body
    const subjEl = document.getElementById(`subj-${id}`);
    text = subjEl ? `Subject: ${subjEl.value}\n\n${body}` : body;

  } else if (s.meta) {
    // case note: Date + Subject (+ Duration) header then body
    const dateEl = document.getElementById(`date-${id}`);
    const dateVal = dateEl ? dateEl.value.trim() : '';
    const subj = s.meta.Subject || '';
    const dur  = s.meta.Duration || '';

    let header = '';
    header += `Date: ${dateVal || '[DATE]'}\n`;
    header += `Subject: ${subj}\n`;
    if (dur) header += `Duration: ${dur}\n`;
    text = `${header}\n${body}`;

  } else {
    text = body;
  }

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`cbtn-${id}`);
    btn.textContent = '✓ Copied!';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
  });
}

function buildTabs() {
  const bar = document.getElementById('tabBar');
  const content = document.querySelector('.content');

  TABS.forEach(t => {
    const count = SCRIPTS.filter(s => s.tab === t.id).length;

    // tab button
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.id = `tab-${t.id}`;
    btn.innerHTML = `${t.label} <span class="tab-count">${count}</span>`;
    btn.onclick = () => showTab(t.id);
    bar.appendChild(btn);

    // page
    const page = document.createElement('div');
    page.className = 'tab-page';
    page.id = `page-${t.id}`;
    const items = SCRIPTS.filter(s => s.tab === t.id);
    page.innerHTML = `<div class="cards">${items.map(renderCard).join('')}</div>`;
    content.appendChild(page);
  });
}

function showTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${id}`).classList.add('active');
  document.getElementById(`tab-${id}`).classList.add('active');

  // clear search if switching tabs
  document.getElementById('searchBox').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('hitCount').textContent = '';
  document.getElementById('searchBanner').classList.remove('on');
}

function doSearch(q) {
  q = q.trim();
  if (!q) { clearSearch(); return; }

  const ql = q.toLowerCase();
  const matches = SCRIPTS.filter(s =>
    (s.title + ' ' + s.when + ' ' + s.script + ' ' + (s.subject||'')).toLowerCase().includes(ql)
  );

  document.getElementById('clearBtn').style.display = 'inline';
  document.getElementById('hitCount').textContent = `${matches.length} result${matches.length!==1?'s':''}`;

  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  const sp = document.getElementById('searchPage');
  sp.classList.add('active');

  const banner = document.getElementById('searchBanner');
  banner.classList.add('on');
  banner.textContent = `${matches.length} result${matches.length!==1?'s':''} matching "${q}"`;

  document.getElementById('searchCards').innerHTML = matches.length
    ? matches.map(renderCard).join('')
    : `<div class="empty">No scripts matched "<strong>${esc(q)}</strong>"</div>`;
}

function clearSearch() {
  document.getElementById('searchBox').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('hitCount').textContent = '';
  document.getElementById('searchBanner').classList.remove('on');
  showTab(activeTab);
}

buildTabs();
showTab('case-notes');
</script>
</body>
</html>
