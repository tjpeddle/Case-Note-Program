<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joel – AT & Testing Scripts</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400&display=swap');

:root {
  --bg:        #0d0d14;
  --panel:     #13131e;
  --sidebar:   #0f0f18;
  --border:    #1e2235;
  --text:      #e0e8ff;
  --muted:     #6b7aaa;
  --header-bg: #080810;
  --gold:      #00ff88;
  --accent:    #00e676;
  --accent2:   #ff4f6d;

  /* Vibrant button colors */
  --c1: #ff3d2e;
  --c2: #ff8c00;
  --c3: #00c853;
  --c4: #00b0ff;
  --c5: #d500f9;
  --c6: #ff1744;
  --c7: #00e5ff;
  --c8: #ffab00;
  --c9: #3d5afe;
  --ca: #f50057;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: var(--header-bg);
  border-bottom: 2px solid var(--gold);
  padding: 0 22px;
  height: 56px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 300;
  box-shadow: 0 2px 20px rgba(0,255,136,.08);
}
.logo { color: #fff; font-size: 16px; font-weight: 700; white-space: nowrap; letter-spacing: -.3px; }
.logo span { color: var(--gold); }

.search-wrap { flex: 1; max-width: 320px; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: .4; }
#searchBox {
  width: 100%; padding: 7px 12px 7px 32px;
  background: rgba(255,255,255,.05); border: 1px solid var(--border);
  border-radius: 20px; color: #fff; font-size: 13px; font-family: inherit; outline: none;
}
#searchBox::placeholder { color: rgba(255,255,255,.25); }
#searchBox:focus { background: rgba(0,255,136,.07); border-color: var(--gold); }
#clearBtn { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; padding: 4px 8px; display: none; }
#clearBtn:hover { color: #fff; }

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--header-bg);
  padding: 0 22px;
  border-bottom: 1px solid var(--border);
  gap: 4px;
}
.tab-btn {
  padding: 10px 20px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; white-space: nowrap;
  margin-bottom: -1px; transition: color .15s;
}
.tab-btn:hover { color: rgba(255,255,255,.8); }
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── LAYOUT ── */
.app { display: flex; height: calc(100vh - 90px); }

/* ── SIDEBAR ── */
.sidebar {
  width: 234px; flex-shrink: 0;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px 12px 20px;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: #1e2235; border-radius: 4px; }

.section-label {
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1.4px;
  color: var(--gold);
  background: rgba(0,255,136,.07);
  border: 1px solid rgba(0,255,136,.18);
  border-radius: 5px;
  padding: 5px 10px;
  margin: 16px 0 8px;
  display: flex; align-items: center; gap: 6px;
}
.section-label:first-child { margin-top: 0; }
.section-label::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

.add-btn-small {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 8px 10px; margin-top: 10px;
  background: rgba(0,255,136,.07);
  border: 1px dashed rgba(0,255,136,.3);
  border-radius: 20px;
  color: var(--gold); font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: background .15s, border-color .15s;
  letter-spacing: .5px;
}
.add-btn-small:hover { background: rgba(0,255,136,.14); border-color: rgba(0,255,136,.5); }

/* ── SCRIPT BUTTONS — pill style ── */
.script-btn {
  display: block; width: 100%;
  padding: 7px 14px; margin-bottom: 5px;
  border: none; border-radius: 20px;
  font-family: inherit; font-size: 11.5px; font-weight: 700;
  cursor: pointer; text-align: left; line-height: 1.3;
  color: #fff;
  letter-spacing: .2px;
  transition: filter .15s, transform .1s, box-shadow .15s;
  position: relative;
}
.script-btn:hover {
  filter: brightness(1.2);
  transform: translateX(3px);
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
}
.script-btn.active {
  outline: 2px solid var(--gold);
  outline-offset: 1px;
  filter: brightness(1.15);
  box-shadow: 0 0 12px rgba(0,255,136,.2);
}
.btn-icon { margin-right: 5px; font-size: 11px; }

.c1 { background: var(--c1); }
.c2 { background: var(--c2); }
.c3 { background: var(--c3); }
.c4 { background: var(--c4); }
.c5 { background: var(--c5); }
.c6 { background: var(--c6); }
.c7 { background: var(--c7); }
.c8 { background: var(--c8); }
.c9 { background: var(--c9); }
.ca { background: var(--ca); }

/* ── SCRIPT VIEW ── */
.script-view {
  flex: 1; background: var(--panel);
  overflow-y: auto; padding: 28px 32px;
}
.script-view::-webkit-scrollbar { width: 5px; }
.script-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; min-height: 300px;
  color: #1e2235; gap: 12px; font-size: 15px; text-align: center;
}
.placeholder-icon { font-size: 56px; opacity: .25; }

.script-panel { display: none; }
.script-panel.active { display: block; }

.script-title {
  font-size: 22px; font-weight: 700; color: #fff;
  margin-bottom: 5px;
}
.script-when {
  font-size: 12px; color: var(--muted); margin-bottom: 22px; font-style: italic;
}

/* date/subject fields */
.fields {
  background: rgba(0,255,136,.05);
  border: 1px solid rgba(0,255,136,.18);
  border-radius: 8px; padding: 14px 16px;
  margin-bottom: 16px;
  display: flex; flex-direction: column; gap: 10px;
}
.field-row { display: flex; align-items: center; gap: 10px; }
.field-row label {
  font-size: 10px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .6px; color: var(--gold); width: 60px; flex-shrink: 0;
}
.field-row input {
  flex: 1; padding: 7px 11px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border); border-radius: 6px;
  font-family: inherit; font-size: 13px; color: #fff; outline: none;
}
.field-row input:focus { border-color: var(--gold); background: rgba(0,255,136,.06); }
.field-row input::placeholder { color: var(--muted); }
.field-val { flex: 1; font-size: 13px; font-weight: 600; color: var(--gold); opacity: .85; }

/* script textarea */
.script-box { position: relative; }
textarea.script-text {
  width: 100%; padding: 16px 18px; padding-top: 50px;
  background: #0a0a12; border: 1px solid var(--border); border-radius: 8px;
  font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; line-height: 1.75;
  color: #c8d8ff; resize: none; outline: none;
}
textarea.script-text:focus { border-color: rgba(0,255,136,.35); }

.copy-btn {
  position: absolute; top: 10px; right: 10px;
  background: var(--gold); color: #000;
  border: none; padding: 6px 18px; border-radius: 20px;
  font-size: 12px; font-weight: 800; cursor: pointer; font-family: inherit;
  letter-spacing: .3px;
  transition: background .15s, box-shadow .15s;
}
.copy-btn:hover { background: #00e676; box-shadow: 0 0 14px rgba(0,255,136,.4); }
.copy-btn.done { background: #00c853; color: #000; }

.delete-btn {
  position: absolute; top: 10px; right: 98px;
  background: rgba(255,79,109,.15); color: #ff6b87;
  border: 1px solid rgba(255,79,109,.3);
  padding: 6px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.delete-btn:hover { background: rgba(255,79,109,.3); }

.reset-btn {
  position: absolute; top: 10px; right: 180px;
  background: rgba(100,130,220,.15); color: #8aa8f0;
  border: 1px solid rgba(100,130,220,.3);
  padding: 6px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: background .15s;
}
.reset-btn:hover { background: rgba(100,130,220,.3); }

.save-indicator {
  margin-top: 6px; font-size: 11px; font-weight: 700;
  min-height: 16px; letter-spacing: .3px;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(6px);
  z-index: 500;
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #13131e;
  border: 1px solid rgba(0,255,136,.2);
  border-radius: 14px; width: 100%; max-width: 580px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 0 60px rgba(0,255,136,.08), 0 24px 60px rgba(0,0,0,.6);
}
.modal-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 18px; font-weight: 700; color: var(--gold); }
.modal-close {
  background: rgba(255,255,255,.06); border: none;
  width: 30px; height: 30px; border-radius: 50%;
  color: var(--muted); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(255,79,109,.2); color: #ff6b87; }
.modal-body { padding: 20px 22px 24px; }

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .6px;
  color: var(--gold); margin-bottom: 6px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%; padding: 9px 12px;
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
  border-radius: 8px; font-family: inherit; font-size: 13px;
  color: #fff; outline: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--gold); background: rgba(0,255,136,.05); }
.form-group input::placeholder,
.form-group textarea::placeholder { color: var(--muted); }
.form-group select option { background: #13131e; }
.form-group textarea { resize: vertical; min-height: 160px; }

.color-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
}
.color-swatch {
  height: 34px; border-radius: 20px; cursor: pointer;
  border: 2px solid transparent; transition: transform .1s, box-shadow .15s;
}
.color-swatch:hover { transform: scale(1.08); }
.color-swatch.selected { border-color: var(--gold); box-shadow: 0 0 10px rgba(0,255,136,.4); }

.modal-footer {
  display: flex; gap: 10px; justify-content: flex-end;
  padding-top: 16px; border-top: 1px solid var(--border); margin-top: 4px;
}
.btn-cancel {
  padding: 8px 20px; background: rgba(255,255,255,.06);
  border: 1px solid var(--border); border-radius: 20px;
  color: var(--muted); font-family: inherit; font-size: 13px; cursor: pointer;
}
.btn-cancel:hover { color: #fff; border-color: rgba(255,255,255,.2); }
.btn-save {
  padding: 8px 24px; background: var(--gold);
  border: none; border-radius: 20px;
  color: #000; font-family: inherit; font-size: 13px; font-weight: 800; cursor: pointer;
  letter-spacing: .3px;
}
.btn-save:hover { background: #00e676; box-shadow: 0 0 14px rgba(0,255,136,.4); }

/* ── SEARCH ── */
#searchPage { display: none; }
#searchPage.active { display: block; }
.search-results { padding: 20px 24px; max-width: 760px; }
.search-banner {
  background: rgba(0,255,136,.07); border: 1px solid rgba(0,255,136,.22);
  border-radius: 8px; padding: 8px 14px; font-size: 12.5px;
  margin-bottom: 14px; display: none; color: var(--gold); font-weight: 600;
}
.search-banner.on { display: block; }
.search-hit {
  background: var(--panel); border: 1px solid var(--border);
  border-left: 4px solid var(--gold); border-radius: 8px;
  padding: 12px 16px; margin-bottom: 10px; cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.search-hit:hover { border-left-color: var(--accent2); box-shadow: 0 2px 12px rgba(0,0,0,.3); }
.search-hit-title { font-weight: 700; color: #fff; font-size: 14px; }
.search-hit-tab   { font-size: 11px; color: var(--gold); margin-top: 3px; font-weight: 600; }
.search-hit-when  { font-size: 12px; color: #6b7aaa; margin-top: 4px; font-style: italic; }

.tab-page { display: none; }
.tab-page.active { display: flex; }

/* ── RENAME ── */
.title-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.rename-btn {
  background: rgba(0,255,136,.1); border: 1px solid rgba(0,255,136,.25);
  color: var(--gold); border-radius: 6px;
  padding: 3px 9px; font-size: 10px; font-weight: 700;
  cursor: pointer; font-family: inherit; white-space: nowrap;
  transition: background .15s;
}
.rename-btn:hover { background: rgba(0,255,136,.22); }
.title-input {
  font-size: 20px; font-weight: 700; color: #fff;
  background: rgba(255,255,255,.06); border: 1px solid var(--gold);
  border-radius: 6px; padding: 3px 10px;
  font-family: inherit; outline: none; flex: 1;
}
</style>
</head>
<body>

<header>
  <div class="logo">Joel · <span>Assistive Technology & Testing</span></div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="white" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398l3.85 3.85a1 1 0 0 0 1.415-1.415l-3.868-3.833zm-5.242 1.656a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
    <input id="searchBox" type="text" placeholder="Search all scripts…" oninput="doSearch(this.value)" autocomplete="off">
  </div>
  <button id="clearBtn" onclick="clearSearch()">✕ Clear</button>
</header>

<div class="tabs" id="tabBar"></div>

<div id="searchPage">
  <div class="search-results">
    <div id="searchBanner" class="search-banner"></div>
    <div id="searchResults"></div>
  </div>
</div>

<div id="mainLayout"></div>

<!-- ADD SCRIPT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Add New Script</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="m-title" placeholder="e.g. Dragon Naturally Speaking – Intro">
      </div>
      <div class="form-group">
        <label>Section</label>
        <select id="m-tab">
          <option value="case-notes">📋 Case Notes</option>
          <option value="at-emails">🎧 AT Emails</option>
          <option value="test-emails">🧪 Testing Emails</option>
        </select>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="m-type">
          <option value="note">Case Note</option>
          <option value="email">Email</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subject Line <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(emails: editable subject / case notes: appears as "Subject:" in copy)</span></label>
        <input type="text" id="m-subject" placeholder="e.g. Dragon NaturallySpeaking – Assistive Technology Support">
      </div>
      <div class="form-group">
        <label>Use When</label>
        <input type="text" id="m-when" placeholder="e.g. After meeting with a student to set up Dragon">
      </div>
      <div class="form-group">
        <label>Script / Body</label>
        <textarea id="m-script" placeholder="Paste or type the full script here…"></textarea>
      </div>
      <div class="form-group">
        <label>Button Color</label>
        <div class="color-grid" id="colorGrid"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveScript()">Save Script</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────
const TABS = [
  { id:'case-notes',   label:'📋 Case Notes' },
  { id:'at-emails',   label:'🎧 AT Emails' },
  { id:'test-emails', label:'🧪 Testing Emails' },
];

const COLORS = [
  { cls:'c1', hex:'#ff3d2e', label:'Hot Red' },
  { cls:'c2', hex:'#ff8c00', label:'Orange' },
  { cls:'c3', hex:'#00c853', label:'Neon Green' },
  { cls:'c4', hex:'#00b0ff', label:'Sky Blue' },
  { cls:'c5', hex:'#d500f9', label:'Purple' },
  { cls:'c6', hex:'#ff1744', label:'Crimson' },
  { cls:'c7', hex:'#00e5ff', label:'Cyan' },
  { cls:'c8', hex:'#ffab00', label:'Amber' },
  { cls:'c9', hex:'#3d5afe', label:'Indigo' },
  { cls:'ca', hex:'#f50057', label:'Pink Red' },
];

const GROUP_DEFS = {
  'case-notes':  [
    { label:'Session Notes', ids:['cn1','cn2','cn3','cn4','cn5','cn6'] },
    { label:'Admin',         ids:['cn7','cn8'] },
  ],
  'at-emails': [
    { label:'Scheduling',       ids:['ae1','ae2','ae3'] },
    { label:'Genio & Glean',    ids:['ae4','ae5','ae6'] },
    { label:'Alternate Format', ids:['ae7','ae8','ae9','ae10','ae11','ae12','ae13','ae14','ae15','ae16'] },
  ],
  'test-emails': [
    { label:'Student Emails', ids:['te1','te2','te3','te4','te5'] },
    { label:'Faculty Emails', ids:['te6'] },
  ],
};

// ─────────────────────────────────────────────────────
// BUILT-IN SCRIPTS
// ─────────────────────────────────────────────────────
const BUILTIN = [
  { id:'cn1', tab:'case-notes', color:'c1', type:'note', icon:'🎧', title:'Genio – In Person',
    when:'After meeting with a student in person to discuss Genio',
    subject:'Genio Note-Taking Software – Assistive Technology Support Session',
    script:`Peddle met with the student to review assistive technology accommodations, focusing specifically on note-taking support. During the session, Peddle introduced the Genio note-taking software and demonstrated its key features, including how to record lectures, title recordings, use AI Quiz Review, and organize notes into collections. A sample collection was created, and a practice recording was completed to showcase the software's functionality. Peddle also demonstrated how to upload slides as well as how to copy the transcript into a word doc. Peddle emphasized the importance of communicating with instructor if AI is utilized to summarize the notes.

Additionally, Peddle discussed the importance of microphone sensitivity for optimal audio capture and guided the student through the steps to increase microphone input on their laptop.

The meeting concluded with Peddle inviting the student to reach out with any further questions and encouraging them to schedule a follow-up appointment as needed.`},

  { id:'cn2', tab:'case-notes', color:'c2', type:'note', icon:'💻', title:'Genio – Virtual',
    when:'After meeting with a student virtually to discuss Genio',
    subject:'Genio Note-Taking Software – Assistive Technology Support Session',
    script:`Peddle met virtually with the student to review assistive technology accommodations, focusing specifically on note-taking support. During the session, Peddle introduced the Genio note-taking software and demonstrated its key features, including how to record lectures, title recordings, use AI Quiz Review, and organize notes into collections. A sample collection was created, and a practice recording was completed to showcase the software's functionality.

Additionally, Peddle discussed the importance of microphone sensitivity for optimal audio capture and guided the student through the steps to increase microphone input on their laptop.

The meeting concluded with Peddle inviting the student to reach out with any further questions and encouraging them to schedule a follow-up appointment as needed.`},

  { id:'cn3', tab:'case-notes', color:'c3', type:'note', icon:'🔄', title:'Glean – Refresher',
    when:'After meeting with a student who needed a Glean refresher',
    subject:'Glean',
    script:`Peddle met with student to discuss Glean. Student stated that they needed a refresher on how to use Glean. Peddle demonstrated some of the features, including recording, making a title for each recording, utilizing AI transcription, and the purpose of collections. A sample collection was created, and a sample recording was made for practice purposes. Finally, Peddle shared how to copy the transcript, paste/saved into a word document and uploaded in ChatGPT. ChatGPT was utilized to summarize the transcriptions into headings and bullets with embedded instructor dialogue. Peddle provided an example of a summarized transcription produced by ChatGPT. Peddle also stated that he would email a video that reviews how to utilize ChatGPT and the Glean transcriptions.`},

  { id:'cn4', tab:'case-notes', color:'c4', type:'note', icon:'📖', title:'Natural Reader',
    when:'After meeting with a student to support Natural Reader',
    subject:'Assistive Technology – Natural Reader',
    script:`Peddle met with the student to provide support with Natural Reader. During the meeting, Peddle demonstrated how to log in to the student's account to access saved text in the library, select from available free voices, and upload PDF files.

Peddle also reviewed the student's approved accommodation for alternate formats and discussed how to effectively utilize PDFs within Natural Reader to support this accommodation. Additionally, Peddle assisted the student in organizing files and folders on their desktop for easier access and improved workflow.`},

  { id:'cn5', tab:'case-notes', color:'c5', type:'note', icon:'📚', title:'Alt Text Format & Natural Reader',
    when:'After walking a student through alt text format request AND Natural Reader',
    subject:'Alt Text Format Directions & Natural Reader',
    script:`Peddle met with the student to provide guidance on submitting an Alternate Text Format request. During the meeting, Peddle demonstrated how to access the Alt Text Format Request section within the student's Accommodate portal. The student was shown how to complete the request form, upload proof of purchase, and submit the request.

Peddle also reviewed the next steps of the process, including accessing converted files via SharePoint, downloading documents into a desktop folder, and organizing files for easy access.

In addition, Peddle introduced the student to Natural Reader. Peddle guided the student through account creation, selecting from the available free voice options, and uploading a PDF to enable text-to-speech functionality. Peddle emphasized that uploaded books are stored in the Natural Reader library for ongoing access. He also demonstrated newer features in the app, such as the ability to repeat sentences and insert pauses after sentences or paragraphs to support comprehension.`},

// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
let activeTab = 'case-notes';
let selectedColor = 'c1';
let customScripts = JSON.parse(localStorage.getItem('joel_custom_scripts') || '[]');

function allScripts() { return [...BUILTIN, ...customScripts]; }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─────────────────────────────────────────────────────
// BUILD

// ─────────────────────────────────────────────────────
// RENAME TITLE
// ─────────────────────────────────────────────────────
function startRename(id) {
  const s = allScripts().find(x => x.id === id);
  const row = document.querySelector(`#panel-${id} .title-row`);
  const display = document.getElementById('title-display-' + id);
  const btn = row.querySelector('.rename-btn');
  // swap display for input
  const input = document.createElement('input');
  input.className = 'title-input';
  input.value = s.title;
  input.id = 'title-input-' + id;
  display.replaceWith(input);
  btn.textContent = '✓ Save';
  btn.onclick = () => saveRename(id);
  input.focus();
  input.select();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') saveRename(id); if (e.key === 'Escape') cancelRename(id, s); });
}

function saveRename(id) {
  const input = document.getElementById('title-input-' + id);
  if (!input) return;
  const newTitle = input.value.trim();
  if (!newTitle) return;
  // save to localStorage
  localStorage.setItem('joel_title_' + id, newTitle);
  // update in customScripts if custom
  const ci = customScripts.findIndex(x => x.id === id);
  if (ci >= 0) { customScripts[ci].title = newTitle; localStorage.setItem('joel_custom_scripts', JSON.stringify(customScripts)); }
  buildAll();
  showTab(activeTab);
  setTimeout(() => selectScript(id, activeTab), 40);
}

function cancelRename(id, s) {
  buildAll();
  showTab(activeTab);
  setTimeout(() => selectScript(id, activeTab), 40);
}

// ─────────────────────────────────────────────────────
function buildAll() {
  buildColorGrid();
  const tabBar = document.getElementById('tabBar');
  const mainLayout = document.getElementById('mainLayout');
  tabBar.innerHTML = '';
  mainLayout.innerHTML = '';

  TABS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn'; btn.id = `tab-${t.id}`;
    btn.textContent = t.label;
    btn.onclick = () => showTab(t.id);
    tabBar.appendChild(btn);

    const page = document.createElement('div');
    page.className = 'tab-page'; page.id = `page-${t.id}`;

    // sidebar
    const sidebar = document.createElement('div');
    sidebar.className = 'sidebar'; sidebar.id = `sidebar-${t.id}`;
    buildSidebar(sidebar, t.id);

    // view panel
    const view = document.createElement('div');
    view.className = 'script-view'; view.id = `view-${t.id}`;
    buildView(view, t.id);

    page.appendChild(sidebar);
    page.appendChild(view);
    mainLayout.appendChild(page);
  });
}

function buildSidebar(sidebar, tabId) {
  sidebar.innerHTML = '';
  const groups = GROUP_DEFS[tabId] || [];
  const scripts = allScripts().filter(s => s.tab === tabId);
  const builtinIds = BUILTIN.filter(s => s.tab === tabId).map(s => s.id);

  // built-in groups
  groups.forEach(g => {
    const lbl = document.createElement('div');
    lbl.className = 'section-label'; lbl.textContent = g.label;
    sidebar.appendChild(lbl);
    g.ids.forEach(id => {
      const s = scripts.find(x => x.id === id);
      if (s) sidebar.appendChild(makeBtn(s, tabId));
    });
  });

  // custom scripts for this tab
  const customs = customScripts.filter(s => s.tab === tabId);
  if (customs.length > 0) {
    const lbl = document.createElement('div');
    lbl.className = 'section-label'; lbl.textContent = 'My Scripts';
    sidebar.appendChild(lbl);
    customs.forEach(s => sidebar.appendChild(makeBtn(s, tabId)));
  }

  // add button at bottom
  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn-small';
  addBtn.innerHTML = `<span>＋</span> Add Script`;
  addBtn.onclick = () => openModal(tabId);
  sidebar.appendChild(addBtn);
}

function buildView(view, tabId) {
  view.innerHTML = `<div class="placeholder" id="placeholder-${tabId}">
    <div class="placeholder-icon">👈</div>
    <div>Select a script from the left</div>
  </div>`;
  allScripts().filter(s => s.tab === tabId).forEach(s => {
    view.innerHTML += renderPanel(s);
  });
}

function makeBtn(s, tabId) {
  const savedTitle = localStorage.getItem('joel_title_' + s.id) || s.title;
  const b = document.createElement('button');
  b.className = `script-btn ${s.color}`; b.id = `btn-${s.id}`;
  b.innerHTML = `<span class="btn-icon">${s.icon||'📄'}</span>${esc(savedTitle)}`;
  b.onclick = () => selectScript(s.id, tabId);
  return b;
}

function renderPanel(s) {
  const isEmail = s.type === 'email';
  const isCustom = customScripts.find(c => c.id === s.id);
  const rows = Math.max(8, (s.script.match(/\n/g)||[]).length + 4);

  // load any saved edit
  const savedTitle = localStorage.getItem('joel_title_' + s.id) || s.title;
  const displayTitle = savedTitle;
  const savedEdit = localStorage.getItem('joel_edit_' + s.id);
  const scriptText = savedEdit !== null ? savedEdit : s.script;
  const hasEdit = savedEdit !== null && savedEdit !== s.script && !isCustom;

  const fieldsHtml = isEmail
    ? `<div class="fields"><div class="field-row"><label>Subject</label><input type="text" id="subj-${s.id}" value="${esc(s.subject||'')}"></div></div>`
    : `<div class="fields">
        <div class="field-row"><label>Date</label><input type="text" id="date-${s.id}" placeholder="e.g. July 7, 2025"></div>
        <div class="field-row"><label>Subject</label><span class="field-val">${esc(s.subject||'')}</span></div>
       </div>`;
  const deleteBtn = isCustom ? `<button class="delete-btn" onclick="deleteScript('${s.id}')">🗑 Delete</button>` : '';
  const resetBtn  = hasEdit  ? `<button class="reset-btn" id="rbtn-${s.id}" onclick="resetScript('${s.id}')">↺ Reset</button>` : '';

  return `
  <div class="script-panel" id="panel-${s.id}">
    <div class="title-row">
      <div class="script-title" id="title-display-${s.id}">${s.icon||'📄'} ${esc(displayTitle)}</div>
      <button class="rename-btn" onclick="startRename('${s.id}')">✏ Rename</button>
    </div>
    <div class="script-when">Use when: ${esc(s.when)}</div>
    ${fieldsHtml}
    <div class="script-box">
      ${deleteBtn}
      ${resetBtn}
      <textarea class="script-text" id="txt-${s.id}" rows="${rows}" oninput="autoSave('${s.id}')">${esc(scriptText)}</textarea>
      <button class="copy-btn" id="cbtn-${s.id}" onclick="copyIt('${s.id}')">Copy</button>
    </div>
    <div class="save-indicator" id="saved-${s.id}"></div>
  </div>`;
}

// ─────────────────────────────────────────────────────
// INTERACTION
// ─────────────────────────────────────────────────────
function selectScript(id, tab) {
  document.querySelectorAll(`#view-${tab} .script-panel`).forEach(p => p.classList.remove('active'));
  document.querySelectorAll(`#sidebar-${tab} .script-btn`).forEach(b => b.classList.remove('active'));
  const ph = document.getElementById(`placeholder-${tab}`);
  if (ph) ph.style.display = 'none';
  const panel = document.getElementById(`panel-${id}`);
  if (panel) panel.classList.add('active');
  const btn = document.getElementById(`btn-${id}`);
  if (btn) btn.classList.add('active');
}

function showTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${id}`).classList.add('active');
  document.getElementById(`tab-${id}`).classList.add('active');
  document.getElementById('searchPage').classList.remove('active');
  document.getElementById('searchBox').value = '';
  document.getElementById('clearBtn').style.display = 'none';
}


// ─────────────────────────────────────────────────────
// AUTO-SAVE EDITS
// ─────────────────────────────────────────────────────
let saveTimer = null;
function autoSave(id) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const val = document.getElementById('txt-' + id)?.value;
    if (val !== undefined) {
      localStorage.setItem('joel_edit_' + id, val);
      const ind = document.getElementById('saved-' + id);
      if (ind) { ind.textContent = '✓ Saved'; ind.style.color = '#4caf82'; setTimeout(() => { if(ind) ind.textContent = ''; }, 2000); }
    }
  }, 800);
}

function resetScript(id) {
  if (!confirm('Reset this script back to the original? Your edits will be lost.')) return;
  localStorage.removeItem('joel_edit_' + id);
  buildAll();
  showTab(activeTab);
  setTimeout(() => selectScript(id, activeTab), 40);
}

function copyIt(id) {
  const s = allScripts().find(x => x.id === id);
  const body = document.getElementById(`txt-${id}`).value;
  let text = '';
  if (s.type === 'email') {
    const subj = document.getElementById(`subj-${id}`)?.value || s.subject;
    text = `Subject: ${subj}\n\n${body}`;
  } else {
    const dateVal = document.getElementById(`date-${id}`)?.value.trim() || '[DATE]';
    text = `Date: ${dateVal}\nSubject: ${s.subject}\n\n${body}`;
  }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`cbtn-${id}`);
    btn.textContent = '✓ Copied!'; btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
  });
}

// ─────────────────────────────────────────────────────
// ADD / DELETE
// ─────────────────────────────────────────────────────
function openModal(defaultTab) {
  document.getElementById('m-title').value = '';
  document.getElementById('m-subject').value = '';
  document.getElementById('m-when').value = '';
  document.getElementById('m-script').value = '';
  document.getElementById('m-tab').value = defaultTab || activeTab;
  document.getElementById('m-type').value = 'note';
  selectedColor = 'c1';
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  document.querySelector('.color-swatch[data-cls="c1"]')?.classList.add('selected');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveScript() {
  const title   = document.getElementById('m-title').value.trim();
  const tab     = document.getElementById('m-tab').value;
  const type    = document.getElementById('m-type').value;
  const subject = document.getElementById('m-subject').value.trim();
  const when    = document.getElementById('m-when').value.trim();
  const script  = document.getElementById('m-script').value.trim();
  if (!title || !script) { alert('Title and script body are required.'); return; }
  const id = 'custom_' + Date.now();
  const newScript = { id, tab, color: selectedColor, type, icon: type === 'note' ? '📝' : '✉️', title, when: when || 'Custom script', subject: subject || title, script, custom: true };
  customScripts.push(newScript);
  localStorage.setItem('joel_custom_scripts', JSON.stringify(customScripts));
  closeModal();
  buildAll();
  showTab(tab);
  setTimeout(() => selectScript(id, tab), 50);
}

function deleteScript(id) {
  if (!confirm('Delete this script? This cannot be undone.')) return;
  customScripts = customScripts.filter(s => s.id !== id);
  localStorage.setItem('joel_custom_scripts', JSON.stringify(customScripts));
  buildAll();
  showTab(activeTab);
}

// ─────────────────────────────────────────────────────
// COLOR GRID
// ─────────────────────────────────────────────────────
function buildColorGrid() {
  const grid = document.getElementById('colorGrid');
  grid.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c.hex;
    sw.setAttribute('data-cls', c.cls);
    sw.title = c.label;
    sw.onclick = () => {
      selectedColor = c.cls;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    };
    grid.appendChild(sw);
  });
}

// ─────────────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────────────
function doSearch(q) {
  q = q.trim();
  if (!q) { clearSearch(); return; }
  const ql = q.toLowerCase();
  const matches = allScripts().filter(s =>
    (s.title+' '+s.when+' '+s.script+' '+s.subject).toLowerCase().includes(ql)
  );
  document.getElementById('clearBtn').style.display = 'inline';
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('searchPage').classList.add('active');
  const tabLabels = {'case-notes':'📋 Case Notes','at-emails':'🎧 AT Emails','test-emails':'🧪 Testing Emails'};
  document.getElementById('searchBanner').classList.add('on');
  document.getElementById('searchBanner').textContent = `${matches.length} result${matches.length!==1?'s':''} for "${q}"`;
  document.getElementById('searchResults').innerHTML = matches.length
    ? matches.map(s => `<div class="search-hit" onclick="goToScript('${s.id}','${s.tab}')">
        <div class="search-hit-title">${s.icon||'📄'} ${esc(s.title)}</div>
        <div class="search-hit-tab">${tabLabels[s.tab]}</div>
        <div class="search-hit-when">${esc(s.when)}</div>
      </div>`).join('')
    : `<div style="color:var(--muted);padding:40px;text-align:center">No results for "<strong>${esc(q)}</strong>"</div>`;
}

function goToScript(id, tab) {
  clearSearch();
  showTab(tab);
  setTimeout(() => selectScript(id, tab), 40);
}

function clearSearch() {
  document.getElementById('searchBox').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('searchBanner').classList.remove('on');
  document.getElementById('searchPage').classList.remove('active');
  showTab(activeTab);
}

// close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

buildAll();
showTab('case-notes');
</script>
